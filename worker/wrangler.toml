# ────────────────────────────────────────────────────────────────────
# THIS WORKER (`lead-manager-api`) is the live Twilio + leads API.
# It serves Twilio voice/SMS webhooks at lead-manager-api.irontigerdigital.workers.dev.
# The static PWA lives one level up in ../wrangler.jsonc as `pwa-lead-manager`.
# Always deploy via `npm run deploy:api` from the parent dir — never bare `wrangler deploy`.
# ────────────────────────────────────────────────────────────────────
name = "lead-manager-api"
main = "index.js"
compatibility_date = "2024-01-01"
account_id = "666e858af8609cfce121751955534e7d"

[vars]
# TWILIO_ACCOUNT_SID is set via: wrangler secret put TWILIO_ACCOUNT_SID
# Or set as an env var and it will be available as env.TWILIO_ACCOUNT_SID

[[kv_namespaces]]
binding = "SPAM_LOG"
id = "6bfe2a37d25e4107bfa3cd276d1be5cf"
